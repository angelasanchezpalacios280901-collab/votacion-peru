<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulación Electoral Perú 2026</title>

<style>

body{
font-family:Arial;
background:#f0f0f0;
text-align:center;
}

h1{
background:#d40000;
color:white;
padding:15px;
}

#total{
font-size:20px;
margin:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
}

.logo{
width:40px;
margin-top:5px;
}

button{
padding:8px 15px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.votar{
background:#0a8f2d;
color:white;
}

.no{
background:#c70000;
color:white;
}

#ranking{
margin:40px;
font-size:18px;
background:white;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Simulación Electoral Perú 2026</h1>

<div id="total">Total votos: 0</div>

<div class="grid" id="contenedor"></div>

<br>

<button onclick="resultados()">VER RESULTADOS</button>

<div id="ranking"></div>

<script>

let total=0;

let candidatos=[

{nombre:"Keiko Fujimori",foto:"https://upload.wikimedia.org/wikipedia/commons/9/99/Keiko_Fujimori.jpg",logo:"https://upload.wikimedia.org/wikipedia/commons/2/2b/Fuerza_Popular_logo.png",votos:0},

{nombre:"Rafael López Aliaga",foto:"https://upload.wikimedia.org/wikipedia/commons/e/e2/Rafael_Lopez_Aliaga.jpg",logo:"https://upload.wikimedia.org/wikipedia/commons/3/39/Renovacion_Popular_logo.png",votos:0},

{nombre:"Carlos Álvarez",foto:"https://upload.wikimedia.org/wikipedia/commons/5/5f/Carlos_Alvarez.jpg",logo:"https://via.placeholder.com/40",votos:0}

];

for(let i=4;i<=36;i++){

candidatos.push({
nombre:"Candidato "+i,
foto:"https://via.placeholder.com/120",
logo:"https://via.placeholder.com/40",
votos:0
})

}

let cont=document.getElementById("contenedor");

candidatos.forEach((c,i)=>{

cont.innerHTML+=`

<div class="card">

<img src="${c.foto}">

<h3>${c.nombre}</h3>

<img class="logo" src="${c.logo}">

<br>

<button class="votar" onclick="votar(${i})">VOTAR</button>
<button class="no">NO VOTAR</button>

<p>Votos: <span id="v${i}">0</span></p>

</div>

`;

});

function votar(i){

candidatos[i].votos++;
total++;

document.getElementById("v"+i).innerText=candidatos[i].votos;
document.getElementById("total").innerText="Total votos: "+total;

}

function resultados(){

let ranking=[...candidatos].sort((a,b)=>b.votos-a.votos);

let html="<h2>Ranking electoral</h2>";

ranking.forEach((c,i)=>{

let p= total? ((c.votos/total)*100).toFixed(1):0;

html+=`${i+1}° ${c.nombre} - ${c.votos} votos (${p}%)<br>`;

});

document.getElementById("ranking").innerHTML=html;

}

</script>

</body>
</html>
