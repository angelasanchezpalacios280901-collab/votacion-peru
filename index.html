let votosSi=new Array(candidatos.length).fill(0)

let cont=document.getElementById("candidatos")

candidatos.forEach((c,i)=>{

cont.innerHTML+=`

<div class="card">

<img class="foto" src="${c.foto}">

<h3>${c.nombre}</h3>

<img class="logo" src="${c.logo}">

<p>SI: <span id="si${i}">0</span></p>

<button class="si" onclick="votarSi(${i})">VOTAR</button>

</div>

`

})

function votarSi(i){

votosSi[i]++

document.getElementById("si"+i).innerText=votosSi[i]

grafica.data.datasets[0].data=votosSi

grafica.update()

}

let ctx=document.getElementById("grafica")

let grafica=new Chart(ctx,{

type:"bar",

data:{

labels:candidatos.map(c=>c.nombre),

datasets:[{

label:"Votos",

data:votosSi

}]

}

})
