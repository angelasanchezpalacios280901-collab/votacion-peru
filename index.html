<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Votacion Peru 2026</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

header{
background:#d60000;
color:white;
padding:15px;
font-size:26px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
width:220px;
margin:12px;
padding:12px;
}

img{
width:100%;
border-radius:8px;
}

.logo{
width:60px;
margin-top:5px;
}

button{
padding:8px 12px;
margin:4px;
border:none;
border-radius:5px;
cursor:pointer;
}

.votar{
background:#28a745;
color:white;
}

.no{
background:#dc3545;
color:white;
}

.barra{
height:10px;
background:#28a745;
margin-top:6px;
border-radius:5px;
width:0%;
}

</style>

</head>

<body>

<header>
PERU REGISTRO DE VOTOS
</header>

<h3>Elige tu candidato</h3>

<div class="container" id="candidatos"></div>

<h2>Resultados</h2>

<canvas id="grafica" width="400" height="200"></canvas>

<script>

let candidatos=[

{nombre:"Keiko Fujimori",foto:"https://via.placeholder.com/200",logo:"https://via.placeholder.com/60"},
{nombre:"Cesar Acuna",foto:"https://via.placeholder.com/200",logo:"https://via.placeholder.com/60"},
{nombre:"Rafael Lopez Aliaga",foto:"https://via.placeholder.com/200",logo:"https://via.placeholder.com/60"},
{nombre:"George Forsyth",foto:"https://via.placeholder.com/200",logo:"https://via.placeholder.com/60"},
{nombre:"Carlos Alvarez",foto:"https://via.placeholder.com/200",logo:"https://via.placeholder.com/60"},
{nombre:"Vladimir Cerron",foto:"https://via.placeholder.com/200",logo:"https://via.placeholder.com/60"}

]

let votos=new Array(candidatos.length).fill(0)

let cont=document.getElementById("candidatos")

candidatos.forEach((c,i)=>{

cont.innerHTML+=`

<div class="card">

<img src="${c.foto}">

<h3>${c.nombre}</h3>

<img class="logo" src="${c.logo}">

<p id="v${i}">0 votos</p>

<button class="votar" onclick="votar(${i})">VOTAR</button>

<button class="no">NO VOTAR</button>

<div class="barra" id="b${i}"></div>

</div>

`

})

function votar(i){

votos[i]++

document.getElementById("v"+i).innerText=votos[i]+" votos"

actualizar()

}

function actualizar(){

let total=votos.reduce((a,b)=>a+b,0)

votos.forEach((v,i)=>{

let p= total ? (v/total)*100 : 0

document.getElementById("b"+i).style.width=p+"%"

})

grafica.data.datasets[0].data=votos
grafica.update()

}

let ctx=document.getElementById("grafica")

let grafica=new Chart(ctx,{

type:"bar",

data:{

labels:candidatos.map(c=>c.nombre),

datasets:[{

label:"Votos",

data:votos

}]

},

options:{responsive:true}

})

</script>

</body>
</html>
