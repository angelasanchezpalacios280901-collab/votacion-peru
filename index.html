<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulación Electoral Perú 2026</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#d60000;
color:white;
text-align:center;
padding:15px;
font-size:28px;
font-weight:bold;
}

.controles{
text-align:center;
margin:15px;
}

select{
padding:8px;
font-size:16px;
}

#total{
text-align:center;
font-size:20px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.foto{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
}

.logo{
width:40px;
margin-top:5px;
}

button{
margin:5px;
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.votar{
background:green;
color:white;
}

.no{
background:red;
color:white;
}

.votos{
margin-top:8px;
font-weight:bold;
}

</style>
</head>

<body>

<header>Simulación Electoral Perú 2026</header>

<div class="controles">

<label>Selecciona el departamento:</label>

<select>
<option>Lima</option>
<option>Callao</option>
<option>Amazonas</option>
<option>Áncash</option>
<option>Apurímac</option>
<option>Arequipa</option>
<option>Ayacucho</option>
<option>Cajamarca</option>
<option>Cusco</option>
<option>Huancavelica</option>
<option>Huánuco</option>
<option>Ica</option>
<option>Junín</option>
<option>La Libertad</option>
<option>Lambayeque</option>
<option>Loreto</option>
<option>Madre de Dios</option>
<option>Moquegua</option>
<option>Pasco</option>
<option>Piura</option>
<option>Puno</option>
<option>San Martín</option>
<option>Tacna</option>
<option>Tumbes</option>
<option>Ucayali</option>
</select>

</div>

<div id="total">Total votos: 0</div>

<div class="grid" id="candidatos"></div>

<script>

let total=0;

const candidatos=[

"José Daniel Williams Zapata",
"Keiko Sofía Fujimori Higuchi",
"César Acuña Peralta",
"Jorge Nieto Montesinos",
"Rafael López Aliaga",
"Rosario del Pilar Fernández",
"Álex Gonzales Castillo",
"Herbert Caller Gutiérrez",
"Roberto Enrique Chiabra León",
"Pablo Alfonso López Chau",
"José León Luna Gálvez",
"Rafael Jorge Belaunde Llosa",
"Alfonso Carlos Espá Garcés",
"Roberto Helbert Sánchez Palomino",
"Antonio Ortiz Villano",
"Ronald Darwin Atencio Sotomayor",
"Carlos Gonzalo Álvarez Loayza",
"Francisco Ernesto Diez-Canseco Távara",
"Wolfgang Mario Grozo Costa",
"Ricardo Pablo Belmont Cassinelli",
"Carlos Ernesto Jaico Carranza",
"Pitter Enrique Valderrama Peña",
"Yonhy Lescano Ancieta",
"Armando Joaquín Massé Fernández",
"George Patrick Forsyth Sommer",
"Luis Fernando Olivera Vega",
"Charlie Carrasco Salazar",
"Fiorella Giannina Molinelli Aristondo",
"Vladimir Roy Cerrón Rojas",
"Mario Enrique Vizcarra Cornejo",
"Paul Davis Jaimes Blanco",
"Mesías Antonio Guevara Amasifuén",
"Walter Gilmer Chirinos Purizaga",
"Napoleón Becerra García",
"Álvaro Gonzalo Paz de la Barra Freigeiro",
"María Soledad Pérez Tello"

];

const contenedor=document.getElementById("candidatos");

candidatos.forEach((nombre,i)=>{

let votos=0;

let card=document.createElement("div");
card.className="card";

card.innerHTML=`

<img src="img/candidato${i+1}.jpg" class="foto">

<h3>${nombre}</h3>

<img src="img/logo${i+1}.png" class="logo">

<br>

<button class="votar">VOTAR</button>
<button class="no">NO VOTAR</button>

<div class="votos">Votos: <span>0</span></div>

`;

let votarBtn=card.querySelector(".votar");
let texto=card.querySelector("span");

votarBtn.onclick=()=>{
votos++;
total++;
texto.innerText=votos;
document.getElementById("total").innerText="Total votos: "+total;
};

contenedor.appendChild(card);

});

</script>

</body>
</html>
