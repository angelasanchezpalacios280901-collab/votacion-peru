<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Votación Perú 2026</title>

<style>

body{
font-family:Arial;
background:#ffffff;
text-align:center;
}

header{
background:#d60000;
color:white;
padding:12px;
font-size:22px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
border:1px solid #ddd;
border-radius:10px;
width:210px;
margin:10px;
padding:12px;
}

button{
background:#d60000;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

select{
padding:8px;
margin:10px;
font-size:16px;
}

</style>

</head>

<body>

<header>
PERÚ REGISTRO DE VOTOS 2026
</header>

<h3>Selecciona tu departamento</h3>

<select>
<option>Lima</option>
<option>Callao</option>
<option>Amazonas</option>
<option>Áncash</option>
<option>Apurímac</option>
<option>Arequipa</option>
<option>Ayacucho</option>
<option>Cajamarca</option>
<option>Cusco</option>
<option>Huancavelica</option>
<option>Huánuco</option>
<option>Ica</option>
<option>Junín</option>
<option>La Libertad</option>
<option>Lambayeque</option>
<option>Loreto</option>
<option>Madre de Dios</option>
<option>Moquegua</option>
<option>Pasco</option>
<option>Piura</option>
<option>Puno</option>
<option>San Martín</option>
<option>Tacna</option>
<option>Tumbes</option>
<option>Ucayali</option>
</select>

<h2>Elige tu candidato</h2>

<div class="container" id="candidatos"></div>

<script>

let candidatos=[

"Keiko Fujimori",
"César Acuña",
"Jorge Nieto Montesinos",
"Rosario Fernández",
"Herbert Caller",
"Alfonso López-Chau",
"José Luna Gálvez",
"Roberto Sánchez",
"Carlos Jaico",
"Fernando Olivera",
"Charlie Carrasco",
"Marisol Pérez Tello",
"Paul Jaimes",
"Mesías Guevara",
"Álvaro Paz de la Barra",
"George Forsyth",
"Carlos Álvarez",
"Francisco Diez-Canseco",
"Wolfgang Grozo",
"Ricardo Belmont",
"Napoleón Becerra",
"Ronald Atencio",
"Yonhy Lescano",
"Mario Vizcarra",
"Joaquín Massé Fernández",
"Enrique Valderrama",
"Alex Gonzales",
"Roberto Chiabra",
"Rafael Belaunde",
"Carlos Espá",
"Antonio Ortiz Villano",
"Fiorella Molinelli",
"Vladimir Cerrón",
"Walter Chirinos",
"Rafael López Aliaga",
"José Williams"

]

let votos=new Array(candidatos.length).fill(0)

let cont=document.getElementById("candidatos")

candidatos.forEach((c,i)=>{

cont.innerHTML+=`
<div class="card">
<h3>${c}</h3>
<p id="v${i}">0 votos</p>
<button onclick="votar(${i})">VOTAR</button>
</div>
`

})

function votar(i){

votos[i]++

document.getElementById("v"+i).innerText=votos[i]+" votos"

}

</script>

</body>
</html>
