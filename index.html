<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Perú Registro de Votos 2026</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

header{
background:#c40000;
color:white;
padding:15px;
font-size:24px;
font-weight:bold;
}

.topbar{
margin:10px;
font-size:18px;
}

select{
padding:10px;
font-size:16px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
width:200px;
margin:10px;
padding:10px;
}

button{
background:#c40000;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

.timer{
font-size:28px;
margin:10px;
}

</style>

</head>

<body>

<header>
PERÚ REGISTRO DE VOTOS
</header>

<div class="topbar">
VOTOS TOTALES: <span id="total">0</span>
</div>

<div class="timer">
⏱ Tiempo: <span id="tiempo">60</span>
</div>

<select>
<option>Elegir Departamento</option>
<option>Lima</option>
<option>Arequipa</option>
<option>Cusco</option>
<option>Huánuco</option>
<option>Piura</option>
<option>Junín</option>
<option>Puno</option>
<option>La Libertad</option>
</select>

<h2>Elige tu candidato</h2>

<div class="container" id="candidatos"></div>

<script>

let candidatos=[

"Keiko Fujimori",
"César Acuña",
"Jorge Nieto",
"Rosario Fernández",
"Herbert Caller",
"Alfonso López Chau",
"José Luna Gálvez",
"Roberto Sánchez",
"Carlos Jaico",
"Fernando Olivera",
"Charlie Carrasco",
"Marisol Pérez Tello",
"Paul Jaimes",
"Mesías Guevara",
"Álvaro Paz de la Barra",
"George Forsyth",
"Carlos Álvarez",
"Francisco Diez Canseco",
"Wolfgang Grozo",
"Ricardo Belmont",
"Napoleón Becerra",
"Ronald Atencio",
"Yonhy Lescano",
"Mario Vizcarra",
"Joaquín Massé",
"Enrique Valderrama",
"Alex Gonzales",
"Roberto Chiabra",
"Rafael Belaunde",
"Carlos Espá",
"Antonio Ortiz",
"Fiorella Molinelli",
"Vladimir Cerrón",
"Walter Chirinos",
"Rafael López Aliaga",
"José Williams"

]

let votos=new Array(candidatos.length).fill(0)

let total=0

let cont=document.getElementById("candidatos")

candidatos.forEach((c,i)=>{

cont.innerHTML+=`

<div class="card">

<h3>${c}</h3>

<p id="v${i}">0 votos</p>

<button onclick="votar(${i})">VOTAR</button>

</div>

`

})

function votar(i){

votos[i]++

total++

document.getElementById("v"+i).innerText=votos[i]+" votos"

document.getElementById("total").innerText=total

}

let tiempo=60

setInterval(()=>{

tiempo--

document.getElementById("tiempo").innerText=tiempo

if(tiempo==0){

alert("La votación terminó")

}

},1000)

</script>

</body>
</html>
