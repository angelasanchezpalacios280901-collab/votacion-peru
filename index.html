<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de votos Perú</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

h1{
background:#c40000;
color:white;
padding:12px;
}

select{
padding:10px;
font-size:16px;
margin:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.2);
}

.card img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
}

.logo{
width:45px;
margin-top:5px;
}

button{
padding:8px 15px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.votar{
background:green;
color:white;
}

.no{
background:red;
color:white;
}

#ranking{
margin-top:40px;
font-size:18px;
}

</style>
</head>

<body>

<h1>Registro de votos - Perú</h1>

<select>

<br>
<button onclick="mostrarResultados()">VER RESULTADOS</button>

<div id="ranking"></div>

let contenedor=document.getElementById("candidatos");

candidatos.forEach((c,i)=>{

contenedor.innerHTML+=`

<div class="card">

<img src="${c.foto}">
<h3>${c.nombre}</h3>
<img class="logo" src="${c.logo}">

<br>

<button class="votar" onclick="votar(${i})">VOTAR</button>
<button class="no">NO VOTAR</button>

<p>Votos: <span id="v${i}">0</span></p>

</div>

`;

});

function votar(i){

candidatos[i].votos++;

document.getElementById("v"+i).innerText=candidatos[i].votos;

}

function mostrarResultados(){

let total=candidatos.reduce((a,b)=>a+b.votos,0);

let ranking=[...candidatos].sort((a,b)=>b.votos-a.votos);

let html="<h2>Ranking</h2>";

ranking.forEach((c,i)=>{

let porcentaje= total? ((c.votos/total)*100).toFixed(1):0;

html+=`${i+1}° ${c.nombre} - ${c.votos} votos (${porcentaje}%)<br>`;

});

document.getElementById("ranking").innerHTML=html;

}

</script>

</html>
