<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Votacion Peru 2026</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

header{
background:#c40000;
color:white;
padding:15px;
font-size:26px;
font-weight:bold;
}

.total{
font-size:20px;
margin:10px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
width:220px;
margin:12px;
padding:12px;
}

img{
width:100%;
border-radius:8px;
}

button{
background:#c40000;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
margin-top:5px;
}

.barra{
height:10px;
background:#c40000;
margin-top:5px;
border-radius:5px;
width:0%;
}

</style>

</head>

<body>

<header>
PERU REGISTRO DE VOTOS
</header>

<div class="total">
VOTOS TOTALES: <span id="total">0</span>
</div>

<h3>Elige tu candidato</h3>

<div class="container" id="candidatos"></div>

<script>

let candidatos=[

"Keiko Fujimori",
"Cesar Acuna",
"Jorge Nieto",
"Rosario Fernandez",
"Herbert Caller",
"Alfonso Lopez Chau",
"Jose Luna Galvez",
"Roberto Sanchez",
"Carlos Jaico",
"Fernando Olivera",
"Charlie Carrasco",
"Marisol Perez Tello",
"Paul Jaimes",
"Mesias Guevara",
"Alvaro Paz de la Barra",
"George Forsyth",
"Carlos Alvarez",
"Francisco Diez Canseco",
"Wolfgang Grozo",
"Ricardo Belmont",
"Napoleon Becerra",
"Ronald Atencio",
"Yonhy Lescano",
"Mario Vizcarra",
"Joaquin Masse",
"Enrique Valderrama",
"Alex Gonzales",
"Roberto Chiabra",
"Rafael Belaunde",
"Carlos Espa",
"Antonio Ortiz",
"Fiorella Molinelli",
"Vladimir Cerron",
"Walter Chirinos",
"Rafael Lopez Aliaga",
"Jose Williams"

]

let votos=new Array(candidatos.length).fill(0)

let total=0

let cont=document.getElementById("candidatos")

candidatos.forEach((c,i)=>{

cont.innerHTML+=`

<div class="card">

<img src="https://via.placeholder.com/200x150">

<h3>${c}</h3>

<p id="v${i}">0 votos</p>

<button onclick="votar(${i})">VOTAR</button>

<div class="barra" id="b${i}"></div>

</div>

`

})

function votar(i){

votos[i]++

total++

document.getElementById("v"+i).innerText=votos[i]+" votos"

document.getElementById("total").innerText=total

actualizar()

}

function actualizar(){

let suma=votos.reduce((a,b)=>a+b,0)

votos.forEach((v,i)=>{

let p=suma ? (v/suma)*100 : 0

document.getElementById("b"+i).style.width=p+"%"

})

}

</script>

</body>
</html>
