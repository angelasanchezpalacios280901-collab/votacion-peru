<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Peru Registro de Votos 2026</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

header{
background:#c40000;
color:white;
padding:15px;
font-size:24px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
width:200px;
margin:10px;
padding:10px;
}

button{
background:#c40000;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
PERU REGISTRO DE VOTOS
</header>

<h3>Selecciona tu departamento</h3>

<select>
<option>Lima</option>
<option>Arequipa</option>
<option>Cusco</option>
<option>Huanuco</option>
<option>Piura</option>
<option>Junin</option>
<option>Puno</option>
<option>La Libertad</option>
</select>

<h2>Elige tu candidato</h2>

<div class="container" id="candidatos"></div>

<script>

let candidatos=[

"Keiko Fujimori",
"Cesar Acuna",
"Jorge Nieto",
"Rosario Fernandez",
"Herbert Caller",
"Alfonso Lopez Chau",
"Jose Luna Galvez",
"Roberto Sanchez",
"Carlos Jaico",
"Fernando Olivera",
"Charlie Carrasco",
"Marisol Perez Tello",
"Paul Jaimes",
"Mesias Guevara",
"Alvaro Paz de la Barra",
"George Forsyth",
"Carlos Alvarez",
"Francisco Diez Canseco",
"Wolfgang Grozo",
"Ricardo Belmont",
"Napoleon Becerra",
"Ronald Atencio",
"Yonhy Lescano",
"Mario Vizcarra",
"Joaquin Masse",
"Enrique Valderrama",
"Alex Gonzales",
"Roberto Chiabra",
"Rafael Belaunde",
"Carlos Espa",
"Antonio Ortiz",
"Fiorella Molinelli",
"Vladimir Cerron",
"Walter Chirinos",
"Rafael Lopez Aliaga",
"Jose Williams"

]

let votos=new Array(candidatos.length).fill(0)

let cont=document.getElementById("candidatos")

candidatos.forEach((c,i)=>{

cont.innerHTML+=`
<div class="card">
<h3>${c}</h3>
<p id="v${i}">0 votos</p>
<button onclick="votar(${i})">VOTAR</button>
</div>
`

})

function votar(i){

votos[i]++

document.getElementById("v"+i).innerText=votos[i]+" votos"

}

</script>

</body>
</html>
